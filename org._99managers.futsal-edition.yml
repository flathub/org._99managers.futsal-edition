        url: https://codeberg.org/dulvui/99managers-futsal-edition/raw/commit/f30d124d73fd8ad5703fec8d94a434ee16166a63/flatpak/org._99managers.futsal-edition.appdata.xml
        sha256: 13d6b9f0bcc0e060899cab83726848d2917acde89a81beb87db93c56f2feb28f
